# Test configuration to disable interactive shell
shell.interactive=false
spring.shell.interactive.enabled=false
spring.shell.noninteractive.enabled=false
embabel.agent.platform.scanning.bean=true
spring.main.allow-bean-definition-overriding=true

# Configure LLM model for cookbook integration tests
embabel.models.default-llm=gpt-5.4-mini
embabel.models.llms.best=gpt-5.4-mini
embabel.models.llms.cheapest=gpt-5.4-mini

# Configure embedding models for cookbook integration tests
embabel.models.default-embedding-model=text-embedding-3-small
embabel.models.embedding-services.best=text-embedding-3-small
embabel.models.embedding-services.cheapest=text-embedding-3-small
